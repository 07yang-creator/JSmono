  <style>

    .navbar-links a.admin-link { color: rgba(247,106,12,0.9); margin-left: 8px; }
    .navbar-right { display: flex; align-items: center; gap: 10px; }
    .btn-nav-action {
      background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.85);
      border: 1px solid rgba(255,255,255,0.2); padding: 5px 13px;
      border-radius: 6px; font-size: 12px; cursor: pointer; white-space: nowrap;
    }
    .btn-nav-action:hover { background: rgba(255,255,255,0.18); color: #fff; }
    .btn-nav-login { background: var(--orange); color: #fff; border: none; padding: 7px 18px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-logout { background: transparent; color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
    .btn-logout:hover { border-color: rgba(255,255,255,0.5); color: #fff; }
    .nav-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; overflow: hidden; }

    .prop-header {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 14px 28px; display: flex; align-items: center; gap: 16px;
      flex-wrap: wrap;
    }

    .prop-header-back:hover { color: var(--blue); }
    .prop-header-id   { font-size: 12px; color: var(--muted); }
    .prop-header-name { font-size: 20px; font-weight: 700; color: var(--text); }
    .prop-header-deadline {
      background: var(--red); color: #fff;
      font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 6px;

    .prop-header-spacer { flex: 1; }

    .page-body { max-width: 900px; margin: 0 auto; padding: 24px 20px 80px; display: flex; flex-direction: column; gap: 0; }

    /* ── SECTION TITLE ── */
    .section-title {
      font-size: 16px; font-weight: 700; color: var(--text);
      padding: 16px 0 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-title-line { flex: 1; height: 1px; background: var(--border); }

    /* ── RED DIVIDER ── */
    .red-divider {
      height: 4px;
      background: linear-gradient(90deg, var(--red) 0%, var(--red-lt) 60%, transparent 100%);
      border-radius: 2px;
      margin: 28px 0;
    }

    /* ── SUBSECTION ── */
    .subsection {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 12px;
      overflow: hidden; box-shadow: var(--shadow-sm);
    }
    .subsection-head {
      display: flex; align-items: center; gap: 8px;
      padding: 11px 16px; border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .subsection-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); flex-shrink: 0; }
    .subsection-title { font-size: 13px; font-weight: 700; color: var(--text); flex: 1; }
    .subsection-toggle {
      font-size: 11px; color: var(--blue); cursor: pointer;
      background: none; border: none; font-family: inherit;
      padding: 2px 8px; border-radius: 4px; transition: background 0.12s;
    }
    .subsection-toggle:hover { background: var(--blue-bg); }

    /* ── FIELD GRID ── */
    .fields-basic, .fields-extended {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0; padding: 0;
    }
    @media (max-width: 600px) { .fields-basic, .fields-extended { grid-template-columns: 1fr; } }

    .field-row {
      display: flex; flex-direction: column;
      padding: 9px 16px;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }
    .field-row:nth-child(even) { border-right: none; }
    .field-row:last-child, .field-row:nth-last-child(2):nth-child(odd) { border-bottom: none; }

    .field-label {
      font-size: 11px; color: var(--muted); font-weight: 500;
      margin-bottom: 2px; display: flex; align-items: center; gap: 4px;
    }
    .field-label .red-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--red); }
    .field-value { font-size: 13px; color: var(--text); font-weight: 500; word-break: break-word; }
    .field-value.empty { color: var(--muted); font-weight: 400; }
    .field-value.price { color: var(--red); font-size: 15px; font-weight: 700; }
    .field-value.text-long { white-space: pre-wrap; line-height: 1.65; font-size: 12px; }

    /* Full-width field (spans both columns) */
    .field-row.full-width {
      grid-column: 1 / -1;
      border-right: none;
    }

    /* Google Map embed */
    .map-container {
      grid-column: 1 / -1;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
    }
    .map-container iframe {
      width: 100%; height: 260px; border: none;
      border-radius: 8px; display: block;
    }
    .map-placeholder {
      width: 100%; height: 200px; background: var(--bg);
      border-radius: 8px; border: 1px dashed var(--border);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 13px; flex-direction: column; gap: 6px;
    }

    /* Extended fields collapsible */
    .fields-extended { display: none; }
    .fields-extended.open { display: grid; }
    .extended-divider {
      border-top: 1px dashed var(--border);
      padding: 6px 16px; font-size: 11px; color: var(--muted);
      background: #fafbfc; grid-column: 1 / -1;
    }

    /* ── ACCESS GATE (sections 2 & 3 for viewer_basic) ── */
    .access-gate {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px; text-align: center;
      color: var(--muted); margin-bottom: 12px; box-shadow: var(--shadow-sm);
    }
    .access-gate .icon { font-size: 28px; margin-bottom: 8px; }
    .access-gate .msg  { font-size: 13px; }

    /* ── MEDIA GALLERY ── */
    .media-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px; padding: 14px 16px;
    }
    .media-thumb {
      height: 110px; border-radius: 8px; overflow: hidden;
      background: var(--bg); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 11px; cursor: pointer;
      transition: border-color 0.12s;
    }
    .media-thumb:hover { border-color: var(--blue); }
    .media-thumb img   { width: 100%; height: 100%; object-fit: cover; }
    .media-empty { padding: 24px; text-align: center; color: var(--muted); font-size: 13px; }

    /* Upload form */
    .upload-form {
      border-top: 1px solid var(--border); padding: 14px 16px;
      display: flex; flex-direction: column; gap: 10px;

    .upload-drop {
      border: 2px dashed var(--border); border-radius: 8px;
      padding: 20px; text-align: center; color: var(--muted); font-size: 13px;
      cursor: pointer; transition: border-color 0.15s;
    }
    .upload-drop:hover { border-color: var(--blue); color: var(--blue); }
    .upload-drop input { display: none; }

    /* ── ANALYSIS SECTION ── */
    .analysis-subsection { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; box-shadow: var(--shadow-sm); }
    .analysis-subsection-head { padding: 11px 16px; border-bottom: 1px solid var(--border); background: var(--bg); font-size: 13px; font-weight: 700; color: var(--text); }

    .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
    @media (max-width: 600px) { .input-grid { grid-template-columns: 1fr; } }

    .input-row {
      display: flex; flex-direction: column; gap: 4px;
      padding: 10px 16px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border);
    }
    .input-row:nth-child(even) { border-right: none; }
    .input-row.full-width { grid-column: 1 / -1; border-right: none; }
    .input-row label { font-size: 11px; color: var(--muted); font-weight: 500; }
    .input-row input, .input-row textarea, .input-row select {
      border: 1px solid var(--border); border-radius: 6px;
      padding: 7px 10px; font-size: 13px; color: var(--text);
      background: #fff; font-family: inherit; width: 100%;
      transition: border-color 0.15s;
    }
    .input-row input:focus, .input-row textarea:focus, .input-row select:focus {
      outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(43,108,176,0.1);
    }
    .input-row input[readonly], .input-row textarea[readonly] {
      background: var(--bg); color: var(--text-body); cursor: default;
    }
    .input-row textarea { resize: vertical; min-height: 72px; }

    /* Select badge for 关注级别 */
    .select-attn { font-weight: 600; }

    /* Submit bar */
    .submit-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 16px; border-top: 1px solid var(--border);
      background: var(--bg);
    }
    .btn-submit {
      background: var(--blue); color: #fff; border: none;
      padding: 10px 28px; border-radius: 7px; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: background 0.15s;
    }
    .btn-submit:hover { background: var(--blue-dk); }
    .btn-submit:disabled { background: var(--muted); cursor: not-allowed; }
    .submit-status { font-size: 13px; color: var(--muted); }
    .submit-status.ok  { color: var(--green); }
    .submit-status.err { color: var(--red); }

    /* ── LOGIN GATE (full page) ── */
    #login-gate { max-width: 400px; margin: 80px auto; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 48px 32px; text-align: center; }
    #login-gate h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    #login-gate p  { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
    .btn-login-lg { display: inline-block; background: var(--blue); color: #fff; padding: 11px 32px; border-radius: 7px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; }

    /* ── PRINT ── */
    @media print {
      .navbar, .prop-header .btn-nav-action, .subsection-toggle,
      .upload-form, .submit-bar { display: none !important; }
      .fields-extended { display: grid !important; }
      .subsection { break-inside: avoid; box-shadow: none; }
      .red-divider { background: #c0392b; }
      .page-body { padding: 0; max-width: 100%; }
    }
  </style>
</head>

    try { await _auth0.handleRedirectCallback(); } catch(e) {}
    history.replaceState({}, document.title, location.pathname);
  } else { try { await _auth0.checkSession(); } catch(_) {} }
  await applyAuth();
}

async function applyAuth() {
  let ok = false;
  try { ok = await _auth0.isAuthenticated(); } catch(_) {}
  if (!ok) { document.getElementById('login-gate').style.display = 'block'; return; }

  const user = await _auth0.getUser();
  _token = await _auth0.getTokenSilently();
  const name = user.name || user.email || '';
  document.getElementById('nav-username').textContent = name;
  const img = document.getElementById('nav-avatar-img');
  const ini = document.getElementById('nav-avatar-init');
  if (user.picture) { img.src = user.picture; img.style.display=''; ini.style.display='none'; }
  else { img.style.display='none'; ini.textContent=name[0]?.toUpperCase()||'?'; ini.style.display='flex'; }
  document.getElementById('btn-nav-login').style.display = 'none';
  document.getElementById('nav-auth-user').style.display = 'flex';

  try {
    const r = await fetch('/api/monospages-admin', { headers:{'Authorization':'Bearer '+_token} });
    if (r.ok) { const d = await r.json(); _role = d.monospages_role || 'viewer_basic'; }
  } catch(_) {}
  if (!_role) _role = 'viewer_basic';
  document.getElementById('nav-admin-link').style.display = _role==='admin' ? '' : 'none';

  document.getElementById('prop-header').style.display = '';
  document.getElementById('main-content').style.display = 'block';

  await loadAndRender();
}

function authLogin()  { if(_auth0) _auth0.loginWithRedirect({authorizationParams:{redirect_uri:REDIRECT_URI}}); }
function authLogout() { if(_auth0) _auth0.logout({logoutParams:{returnTo:window.location.origin+'/monospages/'}}); }

function _authHeaders(extra) {
  return Object.assign({ 'Authorization': 'Bearer ' + _token }, extra || {});
}

function _mediaThumb(item) {
  const url = (item && item.url) || '';
  const mime = (item && item.mime_type) || '';
  const label = (item && item.name) || 'media';
  if (!url) return '';
  if (mime.startsWith('video/')) {
    return `<a class="media-thumb" href="${url}" target="_blank" title="${label}">
      <span>🎬 ${label}</span>
    </a>`;
  }
  return `<a class="media-thumb" href="${url}" target="_blank" title="${label}">
    <img src="${url}" alt="${label}">
  </a>`;
}

/* ─────────────────────────────────────────────────────────────
   LOAD SHEET DATA
───────────────────────────────────────────────────────────── */
async function loadAndRender() {
  let prop = null;
  try {
    const url = `https://docs.google.com/spreadsheets/d/${BATCH.sheet_id}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(BATCH.sheet_name)}`;
    const res  = await fetch(url);
    const text = await res.text();
    const s = text.indexOf('{'), e = text.lastIndexOf('}');
    if (s >= 0 && e >= 0) {
      const table = JSON.parse(text.slice(s,e+1)).table;
      prop = findProperty(table, PROP_ID);
    }
  } catch(err) { console.warn('Sheet failed:', err.message); }
  if (!prop) { console.warn('Using mock data'); prop = MOCK_PROP; }
  await hydratePersistedRecords(prop);
  _currentProp = prop;
  renderPage(prop);
}

async function hydratePersistedRecords(prop) {
  const propId = prop['物件命名'] || prop['法拍文件编号'] || PROP_ID;
  const q = `batch_id=${encodeURIComponent(BATCH.id)}&prop_id=${encodeURIComponent(propId)}`;
  try {
    const fr = await fetch('/api/monospages-field-record?' + q, { headers: _authHeaders() });
    if (fr.ok) {
      const d = await fr.json();
      const rec = (d && d.record) || {};
      Object.assign(prop, rec.fields || {});
      _fieldMediaItems = Array.isArray(rec.media_items) ? rec.media_items : [];
    }
  } catch(_) {}
  try {
    const ar = await fetch('/api/monospages-analysis-record?' + q, { headers: _authHeaders() });
    if (ar.ok) {
      const d = await ar.json();
      const rec = (d && d.record) || {};
      Object.assign(prop, rec.fields || {});
    }
  } catch(_) {}
}

function findProperty(table, id) {
  if (!table?.rows) return null;
  const rows = table.rows;
  const numProps = table.cols.length - 2;
  for (let p = 0; p < numProps; p++) {
    const obj = {};
    for (let r = 0; r < rows.length; r++) {
      const fname = rows[r]?.c?.[1]?.v;
      const val   = rows[r]?.c?.[p+2]?.v;
      if (fname != null) obj[fname] = val ?? '';
    }
    if (String(obj['物件命名'])===id || String(obj['法拍文件编号'])===id) return obj;
  }
  return null;
}

/* ─────────────────────────────────────────────────────────────
   FORMAT HELPERS
───────────────────────────────────────────────────────────── */
function fmtJpy(v, monthly) {
  if (!v && v!==0) return null;
  const n = Number(v);
  if (isNaN(n)) return String(v);
  const base = n>=1e8 ? (n/1e8).toFixed(1).replace(/\.0$/,'')+'億'
             : n>=1e4 ? Math.round(n/1e4)+'万'
             : n.toLocaleString();
  return '¥' + base + '円' + (monthly?'/月':'');
}
function fmtArea(v)    { return v ? Number(v).toFixed(2)+' m²' : null; }
function fmtPct(v)     { return v ? Number(v).toFixed(1)+'%' : null; }
function fmtYears(v)   { return v ? Number(v)+'年' : null; }
function fmtNum(v)     { return v ? String(v) : null; }
function fmt(v, format) {
  if (v===null||v===undefined||v==='') return null;
  switch(format) {
    case 'currency_jpy':         return fmtJpy(v,false);
    case 'currency_jpy_monthly': return fmtJpy(v,true);
    case 'area_m2':              return fmtArea(v);
    case 'percent':              return fmtPct(v);
    case 'years':                return fmtYears(v);
    case 'number':               return fmtNum(v);
    default: return String(v);
  }
}

/* ─────────────────────────────────────────────────────────────
   RENDER HELPERS
───────────────────────────────────────────────────────────── */
function fieldRow(label, rawVal, format, isBasic) {
  const val = fmt(rawVal, format);
  const dot  = isBasic ? '<span class="red-dot"></span>' : '';
  const cls  = (!val ? ' empty' : '') + (format==='currency_jpy'&&isBasic ? ' price' : '') + (format==='text_long' ? ' text-long' : '');
  const display = val || '—';
  return `<div class="field-row">
    <div class="field-label">${dot}${label}</div>
    <div class="field-value${cls}">${display}</div>
  </div>`;
}

function fieldRowFull(label, rawVal, format, isBasic) {
  const val = fmt(rawVal, format) || '—';
  const dot = isBasic ? '<span class="red-dot"></span>' : '';
  const cls = format==='text_long' ? ' text-long' : '';
  return `<div class="field-row full-width">
    <div class="field-label">${dot}${label}</div>
    <div class="field-value${cls}">${val}</div>
  </div>`;
}

function renderSubsection(parent, title, basicFields, extendedFields, p, fullWidthBasic) {
  const id = 'ss_' + title.replace(/\s/g,'_');
  let basicHtml = '';
  basicFields.forEach(([label, key, format, isB]) => {
    basicHtml += fullWidthBasic
      ? fieldRowFull(label, p[key], format, isB)
      : fieldRow(label, p[key], format, isB);
  });
  let extHtml = '';
  extendedFields.forEach(([label, key, format, isB]) => {
    extHtml += fieldRow(label, p[key], format, isB);
  });

  const hasExt = extendedFields.length > 0;
  parent.insertAdjacentHTML('beforeend', `
    <div class="subsection" id="${id}">
      <div class="subsection-head">
        <span class="subsection-dot"></span>
        <span class="subsection-title">${title}</span>
        ${hasExt ? `<button class="subsection-toggle" onclick="toggleExt('${id}')" id="${id}_btn">展开扩展数据 ▾</button>` : ''}
      </div>
      <div class="fields-basic">${basicHtml}</div>
      ${hasExt ? `
      <div class="fields-extended" id="${id}_ext">
        <div class="extended-divider">— 扩展数据 —</div>
        ${extHtml}
      </div>` : ''}
    </div>`);
}

async function handleUpload(input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  const status = document.getElementById('upload-status');
  status.textContent = `上传中（${files.length}）…`;
  try {
    const propId = (_currentProp && (_currentProp['物件命名'] || _currentProp['法拍文件编号'])) || PROP_ID;
    const uploaded = [];
    for (const f of files) {
      const fd = new FormData();
      fd.append('file', f);
      fd.append('batch_id', BATCH.id);
      fd.append('prop_id', propId);
      const r = await fetch('/api/monospages-upload', {
        method: 'POST',
        headers: _authHeaders(),
        body: fd
      });
      const d = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(d.error || ('HTTP ' + r.status));
      const item = d.media_item || null;
      if (item && item.url) uploaded.push(item);
    }
    const merged = [];
    const seen = new Set();
    _fieldMediaItems.concat(uploaded).forEach(item => {
      if (!item || !item.url || seen.has(item.url)) return;
      seen.add(item.url);
      merged.push(item);
    });
    _fieldMediaItems = merged;
    await submitComments(true);
    status.textContent = `✓ 上传完成，共 ${uploaded.length} 个新文件`;
    await loadAndRender();
  } catch (e) {
    status.textContent = '✗ 上传失败：' + (e.message || e);
  } finally {
    input.value = '';
  }
}

async function submitComments(skipReload) {
  document.getElementById('comment-status').textContent = '保存中…';
  document.getElementById('comment-status').className = 'submit-status';
  try {
    const fields = {};
    ['现场考察', '周边商业', '公共设施', '噪音'].forEach(key => {
      const el = document.querySelector(`textarea[data-key="${key}"]`);
      fields[key] = el ? el.value : '';
    });
    const propId = (_currentProp && (_currentProp['物件命名'] || _currentProp['法拍文件编号'])) || PROP_ID;
    const r = await fetch('/api/monospages-field-record', {
      method: 'POST',
      headers: _authHeaders({ 'Content-Type': 'application/json' }),
      body: JSON.stringify({
        batch_id: BATCH.id,
        prop_id: propId,
        fields,
        media_items: _fieldMediaItems
      })
    });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(d.error || ('HTTP ' + r.status));
    document.getElementById('comment-status').textContent = '✓ 已保存';
    document.getElementById('comment-status').className = 'submit-status ok';
    if (!skipReload) await loadAndRender();
  } catch (e) {
    document.getElementById('comment-status').textContent = '✗ 保存失败：' + (e.message || e);
    document.getElementById('comment-status').className = 'submit-status err';
  }
}

/* ─────────────────────────────────────────────────────────────
   ANALYSIS (SECTION 3)
───────────────────────────────────────────────────────────── */
function renderAnalysis(parent, p, canEdit) {
  const ro = canEdit ? '' : 'readonly';
  const ro_sel = canEdit ? '' : 'disabled';

  /* Helper to build input rows */
  function iRow(label, key, type, options) {
    const val = p[key] ?? '';
    if (type === 'select') {
      const opts = (options||[]).map(o => `<option value="${o}" ${o==val?'selected':''}>${o}</option>`).join('');
      return `<div class="input-row"><label>${label}</label><select class="select-attn" data-key="${key}" ${ro_sel}><option value="">—</option>${opts}</select></div>`;
    }
    if (type === 'textarea') {
      return `<div class="input-row full-width"><label>${label}</label><textarea data-key="${key}" ${ro}>${val}</textarea></div>`;
    }
    return `<div class="input-row"><label>${label}</label><input type="${type||'text'}" data-key="${key}" value="${val}" ${ro}></div>`;
  }

  const sections = [
    {
      title: '现状调查数值',
      rows: [
        iRow('第三方评估价格','第三方评估价格','number'),
        iRow('AI评估价格','AI评估价格','number'),
        iRow('竞争性报价预估','竞争性报价预估','number')
      ]
    },
    {
      title: '处置费用',
      rows: [
        iRow('室内清理','室内清理','number'),
        iRow('内装想定','内装想定','number'),
        iRow('入居者赔偿','入居者赔偿','number'),
        iRow('驱逐费用','驱逐费用','number'),
        iRow('其他1','其他1','number')
      ]
    },
    {
      title: '收益',
      rows: [
        iRow('预期利润','预期利润','number'),
        iRow('收益率（年）','收益率（年）','number')
      ]
    },
    {
      title: '二判',
      rows: [iRow('二判备注','二判备注','textarea')]
    },
    {
      title: '机会分析',
      rows: [
        iRow('关注级别','关注级别','select',['A','B','C','D']),
        iRow('处置方式','处置方式','select',['修缮出租','修整转售','其他']),
        iRow('要点','要点','textarea'),
        iRow('修缮出租（月租）','修缮出租','number'),
        iRow('收益预计','收益预计','number'),
        iRow('预计收益率','预计收益率','number'),
        iRow('修整转售','修整转售','number'),
        iRow('持有时间','持有时间','text'),
        iRow('转售价格','转售价格','number'),
        iRow('转售收益','转售收益','number'),
        iRow('转售收益年化','转售收益年化','number'),
        iRow('可行入扎价格','可行入扎价格','number'),
        iRow('按入扎价格收益率','按入扎价格收益率','number')
      ]
    }
  ];

  let html = '';
  sections.forEach(sec => {
    html += `
    <div class="analysis-subsection">
      <div class="analysis-subsection-head">${sec.title}</div>
      <div class="input-grid">${sec.rows.join('')}</div>
    </div>`;
  });

  const submitBar = canEdit ? `
    <div class="submit-bar">
      <button class="btn-submit" id="btn-analysis-submit" onclick="submitAnalysis()">提交分析</button>
      <span class="submit-status" id="analysis-status"></span>
    </div>` : `<div style="padding:10px 16px;font-size:12px;color:var(--muted)">高级查看模式 — 只读</div>`;

  parent.insertAdjacentHTML('beforeend',
    `<div class="subsection">${html}${submitBar}</div>`);
}

async function submitAnalysis() {
  const btn = document.getElementById('btn-analysis-submit');
  const status = document.getElementById('analysis-status');
  btn.disabled = true;
  status.textContent = '提交中…';
  status.className = 'submit-status';

  /* Collect all input/select/textarea values from analysis section */
  const payload = { prop_id: PROP_ID, batch_id: BATCH.id, fields: {} };
  document.querySelectorAll('[data-key]').forEach(el => {
    payload.fields[el.dataset.key] = el.value;
  });

  try {
    const res = await fetch('/api/monospages-analysis-record', {
      method: 'POST',
      headers: _authHeaders({ 'Content-Type': 'application/json' }),
      body: JSON.stringify(payload)
    });
    const d = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(d.error || ('HTTP ' + res.status));
    status.textContent = '✓ 已提交';
    status.className = 'submit-status ok';
    await loadAndRender();
  } catch(e) {
    status.textContent = '✗ 提交失败：' + e.message;
    status.className = 'submit-status err';
  } finally {
    btn.disabled = false;
  }
}

/* ─────────────────────────────────────────────────────────────
   BOOT
───────────────────────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', initAuth);
</script>
