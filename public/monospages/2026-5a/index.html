  <!-- ⚠️ TEST MODE — set TEST_MODE=false before production -->
  <script>
  (function () {
    window.TEST_MODE = false;            // test shim disabled
    if (!window.TEST_MODE) return;

    /* Fake Auth0 user (admin role) */
    var _fake = { name:'测试管理员', email:'test@example.com', picture:null, sub:'test|000' };
    var _client = {
      isAuthenticated:      function(){ return Promise.resolve(true); },
      getUser:              function(){ return Promise.resolve(_fake); },
      getTokenSilently:     function(){ return Promise.resolve('test-token-000'); },
      handleRedirectCallback: function(){ return Promise.resolve({}); },
      checkSession:         function(){ return Promise.resolve(); },
      loginWithRedirect:    function(){ /* no-op in test mode */ },
      logout: function(o){
        location.href = (o && o.logoutParams && o.logoutParams.returnTo)
                        || '/monospages/';
      },
    };

    /* Override Auth0Client constructor (most pages) */
    if (window.auth0) window.auth0.Auth0Client = function(){ return _client; };
    /* Override createAuth0Client helper (batches page) */
    window.createAuth0Client = function(){ return Promise.resolve(_client); };

    /* Intercept fetch — fake the role API, pass everything else through */
    var _orig = window.fetch.bind(window);
    window.fetch = function(url, opts) {
      var u = typeof url === 'string' ? url : '';
      if (u.indexOf('/api/monospages-admin') !== -1) {
        return Promise.resolve(new Response(
          JSON.stringify({ monospages_role:'admin', email:'test@example.com', name:'测试管理员' }),
          { status:200, headers:{'Content-Type':'application/json'} }
        ));
      }
      if (u.indexOf('/api/monospages-config') !== -1 && opts && opts.method === 'POST') {
        return Promise.resolve(new Response(
          JSON.stringify({ ok:true }),
          { status:200, headers:{'Content-Type':'application/json'} }
        ));
      }
      return _orig(url, opts);
    };
  })();
  </script>

    .prop-card {

    .prop-card:hover {

    .district-tag {

      .card-cta, .card-footer { display: none; }

    }
  </style>
</head>

    '住居表示':'東京都江東区豊洲3-1-1','面积（专有）':55.0,'建物年限':12,'楼层':20,'总户数':200,'关注级别':'C' }
];

/* ─────────────────────────────────────────────────────────────
   AUTH0
───────────────────────────────────────────────────────────── */
const AUTH0_DOMAIN   = 'dev-5z54p7b3gul1eb27.jp.auth0.com';
const AUTH0_CLIENT_ID = 'oGyqJ3R55KbNjZ6hOru7tpCaPgAHe5Ph';
const REDIRECT_URI   = window.location.origin + '/monospages/2026-5a/';

let _auth0 = null, _token = null, _role = null;

async function initAuth() {
  _auth0 = new window.auth0.Auth0Client({
    domain: AUTH0_DOMAIN, clientId: AUTH0_CLIENT_ID,
    authorizationParams: { redirect_uri: REDIRECT_URI, scope: 'openid profile email offline_access' },
    cacheLocation: 'localstorage', useRefreshTokens: true
  });
  if (location.search.includes('code=') && location.search.includes('state=')) {
    try { await _auth0.handleRedirectCallback(); } catch(e) {}
    history.replaceState({}, document.title, location.pathname);
  } else { try { await _auth0.checkSession(); } catch(_) {} }
  await applyAuth();
}

async function applyAuth() {
  let ok = false;
  try { ok = await _auth0.isAuthenticated(); } catch(_) {}
  if (!ok) { document.getElementById('login-gate').style.display = 'block'; return; }

  const user = await _auth0.getUser();
  _token = await _auth0.getTokenSilently();
  const name = user.name || user.email || '';
  document.getElementById('nav-username').textContent = name;
  const img = document.getElementById('nav-avatar-img');
  const ini = document.getElementById('nav-avatar-init');
  if (user.picture) { img.src = user.picture; img.style.display=''; ini.style.display='none'; }
  else { img.style.display='none'; ini.textContent=name[0]?.toUpperCase()||'?'; ini.style.display='flex'; }
  document.getElementById('btn-nav-login').style.display = 'none';
  document.getElementById('nav-auth-user').style.display = 'flex';

  try {
    const r = await fetch('/api/monospages-admin', { headers:{'Authorization':'Bearer '+_token} });
    if (r.ok) { const d = await r.json(); _role = d.monospages_role || 'viewer_basic'; }
  } catch(_) {}
  if (!_role) _role = 'viewer_basic';

  const isAdmin = _role==='admin';
  document.getElementById('nav-admin-link').style.display = isAdmin ? '' : 'none';

  document.getElementById('page-header').style.display = '';
  document.getElementById('filter-bar').style.display  = '';
  document.getElementById('main-content').style.display = '';

  await loadData();
  restoreFilters();
}

function authLogin()  { if(_auth0) _auth0.loginWithRedirect({authorizationParams:{redirect_uri:REDIRECT_URI}}); }
function authLogout() { if(_auth0) _auth0.logout({logoutParams:{returnTo:window.location.origin+'/monospages/'}}); }

/* ─────────────────────────────────────────────────────────────
   GOOGLE SHEETS LOADER
───────────────────────────────────────────────────────────── */
let _allProps = [];
let _filtered = [];

async function loadData() {
  const url = `https://docs.google.com/spreadsheets/d/${BATCH.sheet_id}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(BATCH.sheet_name)}`;
  try {
    const res  = await fetch(url);
    const text = await res.text();
    const s = text.indexOf('{'), e = text.lastIndexOf('}');
    if (s < 0 || e < 0) throw new Error('bad response');
    const table = JSON.parse(text.slice(s, e+1)).table;
    _allProps = parseProperties(table);
    if (!_allProps.length) throw new Error('empty');
  } catch(err) {
    console.warn('Sheet load failed, using mock data:', err.message);
    _allProps = MOCK_PROPS;
  }
  populateDistricts();
  applyFilters();
}

function parseProperties(table) {
  if (!table?.rows?.length) return [];
  const rows = table.rows;
  const numProps = table.cols.length - 2;
  const props = [];
  for (let p = 0; p < numProps; p++) {
    const obj = {};
    for (let r = 0; r < rows.length; r++) {
      const fname = rows[r]?.c?.[1]?.v;
      const val   = rows[r]?.c?.[p+2]?.v;
      if (fname != null) obj[fname] = val ?? '';
    }
    props.push(obj);
  }
  return props.filter(p => p['物件命名']);
}

/* ─────────────────────────────────────────────────────────────
   FILTERS
───────────────────────────────────────────────────────────── */
let _attnFilter = '';

function populateDistricts() {
  const sel = document.getElementById('f-district');
  const districts = [...new Set(_allProps.map(p => p['所在地区域']).filter(Boolean))].sort();
  districts.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = d;
    sel.appendChild(opt);
  });
}

function setAttn(btn) {
  document.querySelectorAll('.filter-btn[data-attn]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  _attnFilter = btn.dataset.attn;
  applyFilters();
}

function applyFilters() {
  const district = document.getElementById('f-district').value;
  const type     = document.getElementById('f-type').value;
  const sort     = document.getElementById('f-sort').value;

  _filtered = _allProps.filter(p => {
    if (district && p['所在地区域'] !== district) return false;
    if (type     && p['标的']       !== type)     return false;
    if (_attnFilter && p['关注级别'] !== _attnFilter) return false;
    return true;
  });

  const ATTN_ORDER = {A:0, B:1, C:2, D:3, '':4, undefined:4};
  if (sort === 'price_asc')  _filtered.sort((a,b) => (a['买受可能价额']||0) - (b['买受可能价额']||0));
  if (sort === 'price_desc') _filtered.sort((a,b) => (b['买受可能价额']||0) - (a['买受可能价额']||0));
  if (sort === 'attn')       _filtered.sort((a,b) => (ATTN_ORDER[a['关注级别']]||4) - (ATTN_ORDER[b['关注级别']]||4));
  if (sort === 'deadline')   _filtered.sort((a,b) => new Date(a['入扎日期终']||'9999') - new Date(b['入扎日期终']||'9999'));

  document.getElementById('result-count').textContent = `共 ${_filtered.length} 件`;
  renderCards(_filtered);
}

/* ─────────────────────────────────────────────────────────────
   RENDER CARDS
───────────────────────────────────────────────────────────── */
function fmtJpy(v) {
  if (!v && v !== 0) return '—';
  const n = Number(v);
  if (n >= 1e8) return (n/1e8).toFixed(1).replace(/\.0$/,'') + '億円';
  if (n >= 1e4) return Math.round(n/1e4) + '万円';
  return n.toLocaleString() + '円';
}
function fmtArea(v) { return v ? Number(v).toFixed(1) + ' m²' : '—'; }
function daysLeft(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  if (isNaN(d)) return null;
  return Math.ceil((d - Date.now()) / 86400000);
}
function deadlineBadge(p) {
  const days = daysLeft(p['入扎日期终']);
  if (days === null) return `<span class="card-deadline">截止：${p['入扎日期终']||'—'}</span>`;
  if (days < 0)  return `<span class="card-deadline" style="background:#555">已截止</span>`;
  if (days <= 3) return `<span class="card-deadline urgent">⚠ 还剩${days}天</span>`;
  return `<span class="card-deadline">截止 ${days}天后</span>`;
}
function attnBadge(level) {
  const cls = level ? `attn-${level}` : 'attn-none';
  return `<span class="attn-badge ${cls}">${level||'—'}</span>`;
}

function renderCards(props) {
  const grid = document.getElementById('card-grid');
  if (!props.length) {
    grid.innerHTML = `<div class="grid-message"><div class="icon">🔍</div><div>没有符合条件的物件</div></div>`;
    return;
  }
  grid.innerHTML = props.map(p => {
    const id   = encodeURIComponent(p['物件命名'] || '');
    const area = fmtArea(p['面积（专有）']);
    const age  = p['建物年限'] ? `${p['建物年限']}年` : '—';
    const fl   = p['楼层']    ? `${p['楼层']}F` : '—';
    return `
    <a href="/monospages/${BATCH.id}/${encodeURIComponent(p['物件命名']||'')}/" class="prop-card">
      <div class="card-img">
        <div class="card-img-placeholder"><span>🏠</span><div>暂无图片</div></div>
        ${deadlineBadge(p)}
      </div>
      <div class="card-body">
        <div class="card-tags">
          ${attnBadge(p['关注级别'])}
          ${p['所在地区域'] ? `<span class="district-tag">${p['所在地区域']}</span>` : ''}
          ${p['标的'] ? `<span class="type-tag">${p['标的']}</span>` : ''}
        </div>
        <div>
          <div class="card-id">${p['法拍文件编号']||''}</div>
          <div class="card-name">${p['物件命名']||'—'}</div>
        </div>
        <div class="card-price-row">
          <div class="card-price-label">买受可能价额</div>
          <div class="card-price-main">${fmtJpy(p['买受可能价额'])}</div>
          <div class="card-price-deposit">保证金：${fmtJpy(p['保证金'])}</div>
        </div>
        <div class="card-stats">
          <div class="card-stat"><div class="card-stat-val">${area}</div><div class="card-stat-lbl">专有面积</div></div>
          <div class="card-stat"><div class="card-stat-val">${age}</div><div class="card-stat-lbl">建物年限</div></div>
          <div class="card-stat"><div class="card-stat-val">${fl}</div><div class="card-stat-lbl">楼层</div></div>
        </div>
        <div class="card-address">${p['住居表示']||'—'}</div>
      </div>
      <div class="card-footer">
        <span class="card-footer-meta">入札截止：${p['入扎日期终']||'—'}</span>
        <span class="card-cta">查看详情 →</span>
      </div>
    </a>`;
  }).join('');
}

/* ─────────────────────────────────────────────────────────────

───────────────────────────────────────────────────────────── */
function doPrint() { window.print(); }

async function saveFilters() {
  const state = {
    district: document.getElementById('f-district').value,
    type:     document.getElementById('f-type').value,
    attn:     _attnFilter,
    sort:     document.getElementById('f-sort').value
  };
  localStorage.setItem('filters_' + BATCH.id, JSON.stringify(state));
  if (_token) {
    try {
      await fetch('/api/user-profile', {
        method: 'POST',
        headers: { 'Authorization':'Bearer '+_token, 'Content-Type':'application/json' },
        body: JSON.stringify({ key: 'filters_'+BATCH.id, value: state })
      });
    } catch(_) {}
  }
  const btn = document.getElementById('btn-save');
  btn.textContent = '✓ 已保存';
  setTimeout(() => btn.textContent = '💾 保存筛选', 2000);
}

function restoreFilters() {
  const saved = localStorage.getItem('filters_' + BATCH.id);
  if (!saved) return;
  try {
    const s = JSON.parse(saved);
    if (s.district) document.getElementById('f-district').value = s.district;
    if (s.type)     document.getElementById('f-type').value     = s.type;
    if (s.sort)     document.getElementById('f-sort').value     = s.sort;
    if (s.attn !== undefined) {
      _attnFilter = s.attn;
      document.querySelectorAll('.filter-btn[data-attn]').forEach(b => {
        b.classList.toggle('active', b.dataset.attn === s.attn);
      });
    }
  } catch(_) {}
}
